<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ title or "ShieldGig Insurance" }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Sora:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}" />
  </head>
  <body>
    <div class="bg-layer"></div>
    <header class="topbar">
      <a class="brand" href="{{ url_for('landing_page') }}">ShieldGig</a>
      <nav>
        <a href="{{ url_for('landing_page') }}">Home</a>
        <a href="{{ url_for('auth_page') }}">Register/Login</a>
        <a href="{{ url_for('dashboard_page') }}">Dashboard</a>
        <a href="{{ url_for('plans_page') }}">Plan</a>
        <a href="{{ url_for('claims_page') }}">Claims</a>
        <a href="{{ url_for('admin_page') }}">Admin</a>
      </nav>
    </header>

    <main class="container">
      {% block content %}{% endblock %}
    </main>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    {% block scripts %}{% endblock %}
  </body>
</html>
